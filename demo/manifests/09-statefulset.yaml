apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: kube-demo
  labels:
    app: redis
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: kube-demo
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
              name: redis
          args:
            - "--save"
            - "60"
            - "1"
          volumeMounts:
            - name: redis-storage
              mountPath: /data
      volumes:
        - name: redis-storage
          persistentVolumeClaim:
            claimName: redis-data
---
# The headless Service gives each Redis Pod a stable DNS identity
# (<pod-name>.redis.kube-demo.svc). The StatefulSet consumes the PersistentVolume
# Claim created separately to persist data across Pod restarts.
