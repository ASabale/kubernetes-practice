apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: kube-demo
  labels:
    app: web
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
# The Service gives the Pods a stable virtual IP and DNS name. Other objects in
# the namespace can talk to `web-service` regardless of Pod churn.
