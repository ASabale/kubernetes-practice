apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: kube-demo
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: hello-app
          image: ghcr.io/paulbouwer/hello-kubernetes:1.10
          ports:
            - containerPort: 8080
          env:
            - name: MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: MESSAGE
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: REDIS_PORT
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: web-secret
                  key: API_KEY
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
---
# The Deployment demonstrates declarative workloads. It consumes configuration
# via ConfigMaps and Secrets, requests/limits resources, and defines health
# probes so Kubernetes can automatically restart unhealthy Pods.
